name: Gemtek 17xx UBI Installer (repackaging)

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to build'
        type: choice
        default: 'w1701k'
        options:
          - w1701k
          - w1700k
          - all
      extra_packages:
        description: 'Additional packages for inner build (space separated)'
        default: 'luci'
        required: false

env:
  IB_URL: https://downloads.openwrt.org/snapshots/targets/airoha/an7581/openwrt-imagebuilder-airoha-an7581.Linux-x86_64.tar.zst
  IB_NAME: openwrt-imagebuilder-airoha-an7581.Linux-x86_64

jobs:
  prepare:
    name: Select devices
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          case "${{ github.event.inputs.device }}" in
            w1700k)
              matrix='[{"device":"w1700k","profile":"gemtek_w1700k-ubi","dtb":"an7581_gemtek_w1700k-u-boot.dtb","recovery":"openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb","sysupgrade":"openwrt-airoha-an7581-gemtek_w1700k-ubi-squashfs-sysupgrade.itb","installer":"openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-installer.itb"}]'
              ;;
            w1701k)
              matrix='[{"device":"w1701k","profile":"gemtek_w1700k-ubi","dtb":"an7581_gemtek_w1700k-u-boot.dtb","fw_dir":"w1701-fw","recovery":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-initramfs-recovery.itb","sysupgrade":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-squashfs-sysupgrade.itb","installer":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-initramfs-installer.itb","uboot":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-chainload-uboot.itb"}]'
              ;;
            all)
              matrix='[{"device":"w1700k","profile":"gemtek_w1700k-ubi","dtb":"an7581_gemtek_w1700k-u-boot.dtb","recovery":"openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb","sysupgrade":"openwrt-airoha-an7581-gemtek_w1700k-ubi-squashfs-sysupgrade.itb","installer":"openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-installer.itb"},{"device":"w1701k","profile":"gemtek_w1700k-ubi","dtb":"an7581_gemtek_w1700k-u-boot.dtb","fw_dir":"w1701-fw","recovery":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-initramfs-recovery.itb","sysupgrade":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-squashfs-sysupgrade.itb","installer":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-initramfs-installer.itb","uboot":"immortalwrt-airoha-an7581-gemtek_w1701k-ubi-chainload-uboot.itb"}]'
              ;;
            *)
              echo "Unsupported device: ${{ github.event.inputs.device }}" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: Build Installer for (${{ matrix.device }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout installer repository
        uses: actions/checkout@main

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake libfdt-dev device-tree-compiler cpio xz-utils u-boot-tools wget

      - name: Setup Image Builder
        run: |
          wget -q ${{ env.IB_URL }}
          tar -I zstd -xf *.tar.zst
          mv ${{ env.IB_NAME }} ib

      - name: Prepare installer base rootfs
        run: |
          cd ib
          make image PROFILE=${{ matrix.profile }}
          IB_ROOT=$(find build_dir -name "root-airoha" -type d | head -n 1)
          mkdir -p ../installer_skeleton
          cp -pPR "$IB_ROOT/." ../installer_skeleton/

      - name: Stage payload images
        run: |
          cd ib
          mkdir -p ../staging
          mkdir -p ../output
          if [ -n "${{ matrix.fw_dir }}" ]; then
            cp "../${{ matrix.fw_dir }}/${{ matrix.recovery }}" ../staging/
            cp "../${{ matrix.fw_dir }}/${{ matrix.sysupgrade }}" ../staging/
            cp "../${{ matrix.fw_dir }}/${{ matrix.uboot }}" ../output/
          else
            make image PROFILE=${{ matrix.profile }} PACKAGES="${{ github.event.inputs.extra_packages }}"
            cp bin/targets/airoha/an7581/*initramfs-recovery.itb "../staging/${{ matrix.recovery }}"
            cp bin/targets/airoha/an7581/*sysupgrade.itb "../staging/${{ matrix.sysupgrade }}"
            cp bin/targets/airoha/an7581/*uboot* ../output/ || true
          fi

      - name: Repackage installer image
        run: |
          # 1. Ingredient Discovery
          BIN_DIR="ib/bin/targets/airoha/an7581"
          STAGING_IMG_DIR=$(find ib/staging_dir -name "image" -type d | grep "target-" | head -n 1)
          DTB_SOURCE=$(find "$STAGING_IMG_DIR" -name "${{ matrix.dtb }}" | head -n 1)
          KERNEL_BIN=$(find ib/build_dir -name "Image" | head -n 1)
          # Fallback check for Kernel
          if [ -z "$KERNEL_BIN" ]; then
            KERNEL_BIN=$(find "$STAGING_IMG_DIR" -name "Image" | head -n 1)
          fi
          echo "Confirmed DTB: $DTB_SOURCE"
          echo "Confirmed Kernel: $KERNEL_BIN"
          if [ -z "$DTB_SOURCE" ] || [ -z "$KERNEL_BIN" ]; then
            echo "ERROR: Critical ingredients missing."
            exit 1
          fi
          # 2. Setup Workspace
          mkdir -p installer_work/initrd
          cp -pPR installer_skeleton/. installer_work/initrd/
          # 3. Inject payload and universal files
          mkdir -p installer_work/initrd/installer
          cp "staging/${{ matrix.recovery }}" installer_work/initrd/installer/
          cp "staging/${{ matrix.sysupgrade }}" installer_work/initrd/installer/
          if [ -d "files" ]; then
            cp -pPR files/. installer_work/initrd/
          fi
          # Keep the installer initramfs minimal. The normal imagebuilder rootfs
          # carries module autoload state that can spawn early modprobe before
          # the NAND writer starts, and this installer only needs built-in NAND
          # support plus userspace UBI/upgrade tools.
          rm -rf \
            installer_work/initrd/lib/modules \
            installer_work/initrd/lib/firmware \
            installer_work/initrd/etc/modules.conf \
            installer_work/initrd/etc/modules.d \
            installer_work/initrd/etc/modules-boot.d
          rm -f \
            installer_work/initrd/sbin/modprobe \
            installer_work/initrd/sbin/insmod \
            installer_work/initrd/sbin/rmmod
          rm -f \
            installer_work/initrd/etc/rc.d/*dropbear* \
            installer_work/initrd/etc/rc.d/*dnsmasq* \
            installer_work/initrd/etc/rc.d/*firewall* \
            installer_work/initrd/etc/rc.d/*network* \
            installer_work/initrd/etc/rc.d/*odhcpd* \
            installer_work/initrd/etc/rc.d/*uhttpd* \
            installer_work/initrd/etc/rc.d/*wpad*
          cat > installer_work/initrd/init << 'EOF'
          #!/bin/sh
          export INITRAMFS=1
          exec /sbin/init
          EOF
          chmod +x installer_work/initrd/init installer_work/initrd/installer/*.sh installer_work/initrd/lib/preinit/* 2>/dev/null || true
          need_one() {
            name="$1"
            shift
            for path in "$@"; do
              if [ -e "installer_work/initrd$path" ]; then
                return 0
              fi
            done
            echo "ERROR: missing required tool: $name" >&2
            exit 1
          }
          need_one sh /bin/sh
          need_one init /sbin/init
          need_one ubiformat /sbin/ubiformat /usr/sbin/ubiformat
          need_one ubiattach /sbin/ubiattach /usr/sbin/ubiattach
          need_one ubimkvol /sbin/ubimkvol /usr/sbin/ubimkvol
          need_one ubiupdatevol /sbin/ubiupdatevol /usr/sbin/ubiupdatevol
          need_one ubinfo /sbin/ubinfo /usr/sbin/ubinfo
          need_one hexdump /bin/hexdump /usr/bin/hexdump
          need_one strings /bin/strings /usr/bin/strings
          need_one nand.sh /lib/upgrade/nand.sh
          need_one fit.sh /lib/upgrade/fit.sh
          if [ -e installer_work/initrd/sbin/modprobe ]; then
            echo "ERROR: modprobe should not be present in installer initramfs" >&2
            exit 1
          fi
          # 4. Patch Device Tree
          # We store absolute paths before entering the subdirectory
          ABS_DTB=$(realpath "$DTB_SOURCE")
          ABS_KERNEL=$(realpath "$KERNEL_BIN")
          cd installer_work
          dtc -I dtb -O dts -o installer.dts "$ABS_DTB"
          # Apply Gemtek patches
          sed -i '/&pcie[02] {/,/status = "okay";/ s/status = "okay";/status = "disabled";/' installer.dts
          sed -i 's/"ubi"/"ibu"/g' installer.dts
          dtc -I dts -O dtb -o installer.dtb installer.dts
          # 5. Pack Initramfs
          cd initrd
          find . | LC_ALL=C sort | cpio --reproducible -o -H newc -R 0:0 > ../installer.initrd
          cd ..
          du -h installer.initrd
          if cpio -it < installer.initrd | grep -E '\.ko$|lib/firmware|etc/modules|sbin/(modprobe|insmod|rmmod)$'; then
            echo "ERROR: installer initramfs still contains module autoload files" >&2
            exit 1
          fi
          # 6. Generate ITS and Final ITB using absolute kernel path
          ../ib/scripts/mkits.sh \
            -A arm64 \
            -C none \
            -v "6.18" \
            -k "$ABS_KERNEL" \
            -a 0x80200000 \
            -e 0x80200000 \
            -c "config-1" \
            -D "${{ matrix.profile }}" \
            -n 1 \
            -d ./installer.dtb \
            -s 0x82000000 \
            -i ./installer.initrd \
            -o installer.its
          # 7. Final Pack
          mkimage -f installer.its ../output/${{ matrix.installer }}

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.device }}-installer
          path: output/
