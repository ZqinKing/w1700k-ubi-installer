name: Gemtek 17xx UBI Installer

on:
  workflow_dispatch:

env:
  REMOTE_REPOSITORY: hurrian/openwrt-w1700k
  REMOTE_BRANCH: xr1710g-safe
  TARGET_SUBTARGET: airoha/an7581
  INNER_CONFIG: configs/build.config
  OUTER_CONFIG: configs/minimal.config

jobs:
  build:
    name: Build Installer (${{ matrix.device }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: w1700k
            recovery: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb
            sysupgrade: openwrt-airoha-an7581-gemtek_w1700k-ubi-squashfs-sysupgrade.itb
            installer: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-installer.itb
            uboot: openwrt-airoha-an7581-gemtek_w1700k-ubi-chainload-uboot.itb
            installer_source: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb
          - device: w1701k
            fw_dir: w1701-fw
            recovery: immortalwrt-airoha-an7581-gemtek_w1701k-ubi-initramfs-recovery.itb
            sysupgrade: immortalwrt-airoha-an7581-gemtek_w1701k-ubi-squashfs-sysupgrade.itb
            installer: immortalwrt-airoha-an7581-gemtek_w1701k-ubi-initramfs-installer.itb
            uboot: immortalwrt-airoha-an7581-gemtek_w1701k-ubi-chainload-uboot.itb
            installer_source: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb
          - device: xr1710g
            recovery: openwrt-airoha-an7581-gemtek_xr1710g-ubi-initramfs-recovery.itb
            sysupgrade: openwrt-airoha-an7581-gemtek_xr1710g-ubi-squashfs-sysupgrade.itb
            installer: openwrt-airoha-an7581-gemtek_xr1710g-ubi-initramfs-installer.itb
            uboot: openwrt-airoha-an7581-gemtek_xr1710g-ubi-chainload-uboot.itb
            installer_source: openwrt-airoha-an7581-gemtek_xr1710g-ubi-initramfs-recovery.itb

    steps:
      - name: Checkout installer repository
        uses: actions/checkout@main
        with:
          path: installer-repo

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget curl

      - name: Checkout OpenWrt repository
        uses: actions/checkout@main
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.REMOTE_BRANCH }}
          path: openwrt
          fetch-depth: 0

      - name: Update and install feeds
        run: |
          cd openwrt
          sed -i -e 's#https://git.openwrt.org/feed/#https://github.com/openwrt/#g' \
                 -e 's#https://git.openwrt.org/project/#https://github.com/openwrt/#g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build payload firmware
        run: |
          if [ -n "${{ matrix.fw_dir }}" ]; then
            echo "Using precompiled firmware from ${{ matrix.fw_dir }}; skipping inner build."
            exit 0
          fi
          cd openwrt
          cp "../installer-repo/${{ env.INNER_CONFIG }}" .config
          make defconfig
          make -j"$(nproc)" download world

      - name: Build installer image
        run: |
          cd openwrt
          cp "../installer-repo/${{ env.OUTER_CONFIG }}" .config
          make defconfig
          mkdir -p files/installer
          if [ -n "${{ matrix.fw_dir }}" ]; then
            cp "../installer-repo/${{ matrix.fw_dir }}/${{ matrix.recovery }}" "files/installer/"
            cp "../installer-repo/${{ matrix.fw_dir }}/${{ matrix.sysupgrade }}" "files/installer/"
          else
            cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ matrix.recovery }}" "files/installer/"
            cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ matrix.sysupgrade }}" "files/installer/"
          fi
          rsync -a ../installer-repo/files/ files/
          chmod +x files/installer/install.sh files/lib/preinit/00_installer
          make -j"$(nproc)"

      - name: Prepare and Rename Artifacts
        run: |
          mkdir -p output/
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ matrix.installer_source }}" "output/${{ matrix.installer }}"
          if [ -n "${{ matrix.fw_dir }}" ]; then
            cp "installer-repo/${{ matrix.fw_dir }}/${{ matrix.uboot }}" "output/${{ matrix.uboot }}"
          else
            cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ matrix.uboot }}" "output/${{ matrix.uboot }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.device }}-installer
          path: output/
